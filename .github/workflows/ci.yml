name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  nix-check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Check flake
        run: nix flake check --impure

      # 対象は justfile の fmt レシピと同じ定義（追跡下の全 .nix）にする。
      # 以前は profiles/hosts/flake.nix のみで、modules/ の未整形を取りこぼしていた。
      - name: Format check
        run: |
          nix fmt -- $(git ls-files '*.nix')
          git diff --exit-code || (echo "Files need formatting. Run 'just fmt'" && exit 1)

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 対象は justfile の lint-shell レシピと同じ定義（追跡下の全 .sh）にする。
      - name: Run ShellCheck
        run: |
          shellcheck --version
          shellcheck --severity=warning $(git ls-files '*.sh')

  build-profiles:
    name: Build Profiles
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        host: [qia-aws, sbi-superpod]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Build ${{ matrix.host }} profile
        run: |
          nix build .#legacyPackages.$(nix eval --impure --raw --expr 'builtins.currentSystem').homeConfigurations.${{ matrix.host }}.activationPackage --impure

  test-bootstrap:
    name: Test Bootstrap Script
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test bootstrap script
        run: |
          # Don't actually run the full bootstrap, just check syntax
          bash -n remote-bootstrap.sh
          echo "Bootstrap script syntax is valid"

      - name: Check required commands
        run: |
          # Verify script uses required commands correctly
          grep -q "command -v nix" remote-bootstrap.sh
          grep -q "git clone" remote-bootstrap.sh
          grep -q "home-manager" remote-bootstrap.sh
          echo "Bootstrap script structure is valid"
